<div class="content">
    <section class="saved-section">
        <h1>Sparade kurser</h1>
        <div class="result-top">
            <div class="total">
                <h2>Sammanlagda högskolepoäng: <span class="total-points"> {{ totalPoints() }} hp</span>
                </h2>
            </div>
        </div>
        <div class="course-list">
            @for (course of scheduleService.scheduleCourses(); track course.courseCode + '-' + course.subjectCode) {
            <div class="course-card">
                <p class="course-card-head">{{ course.subject }}</p>
                <div class="course-card-content">
                    <h3>{{ course.courseName }}</h3>
                    <p>{{ course.courseCode }}</p>
                    <p>{{ course.points }} hp</p>
                    <button (click)="removeCourse(course)">Ta bort</button>
                </div>
            </div>
            }
        </div>
    </section>
</div>
