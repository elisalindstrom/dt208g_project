<div class="content">
    <section class="search">
        <h1>Sök bland våra kurser</h1>

        <form class="form-search" autocomplete="off">
            <input type="text" id="search" name="search" placeholder="Sök efter kurskod eller kursnamn"
                aria-label="Sök kurser">

            <select id="option" name="option" aria-label="Välj ämne">
                <option value="0">Alla ämnen</option>
            </select>

            <button>Sök kurser</button>
        </form>
    </section>

    <section class="search-result">
        <div class="filter">
            <h2 class="amount">Sökresultat: Antal</h2>
            <button class="sort">A-Ö</button>
        </div>

        <h2>Kurser</h2>
        <div class="course-list">
            @for (course of courses; track course.courseCode + '-' + course.subjectCode) {
            <div id="course-card">
                <h3>{{ course.courseCode }}</h3>
                <p>{{ course.courseName }}</p>
                <p>{{ course.points }}</p>
            </div>
            }
        </div>
    </section>
</div>
